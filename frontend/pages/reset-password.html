<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — AIC Ruiru</title>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light')</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="auth-body">
  <aside class="auth-brand">
    <div class="auth-brand-inner">
      <h1 class="auth-brand-logo"><span>AIC</span> Ruiru</h1>
      <p class="auth-brand-tagline">A community of faith, hope, and love.</p>
      <blockquote class="auth-verse">"And they continued steadfastly… in fellowship."<cite>Acts 2:42</cite></blockquote>
    </div>
  </aside>
  <div class="login-wrap">
    <div class="login-logo">
      <h1><span>AIC</span> Ruiru</h1>
      <p>Member Portal</p>
    </div>
    <div class="card">
      <div id="alert" class="hidden"></div>

      <h2 style="margin-bottom:var(--space-xs);font-size:var(--font-size-xl)">Set new password</h2>
      <p class="text-muted" style="font-size:var(--font-size-sm);margin-bottom:var(--space-lg)">
        Enter the 6-digit code from your email and choose a new password.
      </p>

      <form id="reset-form">
        <div class="form-group">
          <label class="form-label" for="code">Reset code</label>
          <input class="form-input otp-input" type="text" id="code" maxlength="6"
            pattern="[0-9]{6}" placeholder="000000" required inputmode="numeric" autocomplete="one-time-code">
        </div>
        <div class="form-group">
          <label class="form-label" for="new-password">New password</label>
          <input class="form-input" type="password" id="new-password" placeholder="Minimum 8 characters"
            required autocomplete="new-password" minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm password</label>
          <input class="form-input" type="password" id="confirm-password" placeholder="Re-enter new password"
            required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Reset Password</button>
      </form>
    </div>

    <p class="text-center mt-md" style="font-size:var(--font-size-sm)">
      Didn't get a code? <a href="forgot-password.html">Request another</a>
    </p>
  </div>

  <a class="home-fab" href="../index.html" title="Church website">🏠</a>
  <button class="theme-fab" id="theme-fab" title="Toggle theme">☀️</button>
  <script type="module" src="../assets/js/pages/reset-password.js"></script>
</body>
</html>
